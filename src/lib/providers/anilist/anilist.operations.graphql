fragment AnilistAnimeMetadataFields on Media {
    id
    idMal
    title {
        romaji
        english
        native
    }
    synonyms
    format
    status
    episodes
    startDate {
        year
        month
        day
    }
    season
    isAdult
    coverImage {
        extraLarge
        large
        medium
    }
}

query AnilistAnimeDetail($id: Int, $idMal: Int) {
    Media(id: $id, idMal: $idMal, type: ANIME) {
        ...AnilistAnimeMetadataFields
        relations {
            edges {
                relationType
                node {
                    ...AnilistAnimeMetadataFields
                    type
                }
            }
        }
    }
}

query AnilistAiringSchedule($airingAtGreater: Int, $airingAtLesser: Int, $page: Int, $perPage: Int) {
    Page(page: $page, perPage: $perPage) {
        pageInfo {
            total
            currentPage
            lastPage
            hasNextPage
            perPage
        }
        airingSchedules(airingAt_greater: $airingAtGreater, airingAt_lesser: $airingAtLesser, sort: [TIME]) {
            id
            airingAt
            episode
            media {
                ...AnilistAnimeMetadataFields
            }
        }
    }
}
